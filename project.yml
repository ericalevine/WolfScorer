name: WolfScorer

options:
  bundleIdPrefix: com.elevine
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

targets:
  WolfScorer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS
      - path: Shared
    dependencies:
      - target: "WolfScorer Watch App"
        embed: true
        codeSign: true
    info:
      path: iOS/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elevine.WolfScorer
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: 668TAM9PJP
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  WolfScorer Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Watch
      - path: Shared
    info:
      path: Watch/Info.plist
      properties:
        WKCompanionAppBundleIdentifier: com.elevine.WolfScorer
        WKApplication: true
        NSMicrophoneUsageDescription: Wolf Scorer listens for the sound of club impact to automatically advance the tee shot sequence.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elevine.WolfScorer.watchkitapp
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: 668TAM9PJP
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
